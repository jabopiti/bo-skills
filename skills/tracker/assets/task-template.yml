name: Task
description: A gap, bug, or feature for the repo or its pipeline
title: ""
labels: []
body:
  - type: textarea
    id: gap
    attributes:
      label: Gap / Problem
      description: "What is missing, broken, or suboptimal? What is the impact?"
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      description: "XS = 1 isolated file · S = 2–3 files in one area · M = cross-cutting (multiple components) · L = structural (architecture, core conventions, shared protocols)"
      options:
        - XS
        - S
        - M
        - L
    validations:
      required: false

  - type: dropdown
    id: risk
    attributes:
      label: Risk
      description: "high = requires user approval before coding (structural changes, write policy, shared protocols). medium = routing changes, new automation, schema changes. low = new feature in an isolated area, minor tuning."
      options:
        - low
        - medium
        - high
    validations:
      required: false

  - type: textarea
    id: files
    attributes:
      label: Files likely touched
      description: "Paths expected to change. Planning aid, not a contract. Overlaps with other open issues signal bundling."
      placeholder: |
        src/foo.ts
        CLAUDE.md
    validations:
      required: false

  - type: input
    id: depends-on
    attributes:
      label: Depends on
      description: "Issue numbers that must be closed before this can be picked up, e.g. #2, #5"
      placeholder: "#"
    validations:
      required: false

  - type: textarea
    id: before-coding
    attributes:
      label: Before coding (research)
      description: "Questions to answer before writing code. Complete research and post findings as an issue comment before implementation."
    validations:
      required: false

  - type: textarea
    id: open-questions
    attributes:
      label: Open Questions
      description: "Things that must be resolved before this issue can move to Ready. Strike through each question when answered. When this list is empty, the issue may move to Ready."
      placeholder: |
        - [ ] Which approach should we take for X?
        - [ ] Does Y need to change first?
    validations:
      required: false

  - type: textarea
    id: decisions
    attributes:
      label: Decisions
      description: "Resolved choices that shaped the approach. Updated as open questions are answered. Provides rationale for future reference."
      placeholder: |
        - Chose X over Y because Z
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: |
        Checklist items for structural requirements, Given/When/Then for behavioural ones.

        Example:
          - [ ] Output produces valid frontmatter with correct type field
          - [ ] Low-confidence inputs route to the review queue

          **Given** a file is dropped in the inbox
          **When** the dispatcher runs
          **Then** a structured note appears in the correct folder
    validations:
      required: true
